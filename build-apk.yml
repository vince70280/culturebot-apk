name: Build CultureBot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Compiler l'APK Android
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Configurer Android SDK
        run:
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          rm tools.zip
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 📦 npm install
        run: npm install

      - name: 📦 Générer le lock file
        run: npm install --package-lock-only

      - name: 🏗️ Build Vite → dist/
        run: npm run build

      - name: 🔌 Initialiser Capacitor
        run: |
          npx cap init CultureBot com.culturebot.app --web-dir dist
          npx cap add android

      - name: 📄 Copier AndroidManifest.xml
        run: cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: 🔄 Capacitor sync
        run: npx cap sync android

      - name: 🔧 Permissions Gradle
        run: chmod +x android/gradlew

      - name: 🛠️ Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 📝 Renommer l'APK
        run: |
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/CultureBot-${DATE}-build${{ github.run_number }}.apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CultureBot-APK
          path: android/app/build/outputs/apk/debug/CultureBot-*.apk
          retention-days: 30
