name: Build CultureBot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Compiler l'APK Android
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Configurer Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 npm install
        run: npm install

      - name: 🏗️ Build Vite → dist/
        run: npm run build

      - name: 🔌 Initialiser Capacitor
        run: |
          npx cap init CultureBot com.culturebot.app --web-dir dist
          npx cap add android

      - name: 📄 Copier AndroidManifest.xml
        run: cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: 🔄 Capacitor sync
        run: npx cap sync android

      - name: 🔧 Permissions Gradle
        run: chmod +x android/gradlew

      - name: 🛠️ Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 📝 Renommer l'APK
        run: |
          DATE=$(date +'%Y%m%d')
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/CultureBot-${DATE}-build${{ github.run_number }}.apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CultureBot-APK
          path: android/app/build/outputs/apk/debug/CultureBot-*.apk
          retention-days: 30

      - name: ✅ Résumé du build
        run: |
          echo "## 🧠 CultureBot APK compilé !" >> $GITHUB_STEP_SUMMARY
          echo "**Build :** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit :** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Télécharge l'APK dans l'onglet **Artifacts** ci-dessus." >> $GITHUB_STEP_SUMMARY
          echo "Pour installer : active *Sources inconnues* dans Paramètres → Sécurité" >> $GITHUB_STEP_SUMMARY
